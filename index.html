<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="دارجة">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Darija Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--bg2:#0C0C0E;--bg3:#1C1C1E;--bg4:#2C2C2E;--bg5:#3A3A3C;
  --text:#FFF;--text2:rgba(255,255,255,.75);--text3:rgba(255,255,255,.4);
  --accent:#5E5CE6;--accent2:#BF5AF2;--gold:#FFD60A;
  --green:#30D158;--red:#FF453A;--blue:#0A84FF;--orange:#FF9F0A;
  --border:rgba(255,255,255,.08);--glass:rgba(255,255,255,.04);
  --radius:20px;--radius-sm:12px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;height:100%;overscroll-behavior:none}
#root{height:100%}
.app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}
.nav-bar{background:rgba(0,0,0,.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding:8px 0 max(20px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .2s}
.nav-item.active{color:var(--text)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:500}
.card{background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.word-hero{margin:16px;border-radius:28px;overflow:hidden;position:relative;min-height:200px;background:linear-gradient(145deg,#1a1a2e,#16213e,#0f3460);border:1px solid rgba(94,92,230,.3);cursor:pointer}
.word-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(94,92,230,.3),transparent 70%);border-radius:50%}
.word-hero-content{padding:24px;position:relative;z-index:1}
.word-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(94,92,230,.2);border:1px solid rgba(94,92,230,.4);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#8B8EFF;margin-bottom:14px}
.arabic-text{font-size:38px;font-weight:700;direction:rtl;line-height:1.1;margin-bottom:6px}
.transliteration{font-size:17px;color:var(--text2);font-style:italic;margin-bottom:12px;font-family:'Playfair Display',serif}
.definition-text{font-size:13px;color:var(--text2);line-height:1.5}
.tag{display:inline-flex;align-items:center;background:var(--bg4);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--text2)}
.section{padding:0 16px;margin-bottom:18px}
.section-title{font-size:20px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--text3);font-weight:500}
.detail-value{font-size:13px;color:var(--text);text-align:right;max-width:65%;line-height:1.4}
.example-card{background:var(--bg4);border-radius:14px;padding:14px;margin-bottom:10px;direction:rtl;font-size:15px;line-height:1.6;border-left:3px solid var(--accent)}
.srs-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
.srs-btn{border:none;border-radius:14px;padding:14px 8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.srs-btn:active{transform:scale(.95)}
.srs-btn .srs-icon{font-size:20px}
.srs-btn.unknown{background:rgba(255,69,58,.15);color:#FF453A;border:1px solid rgba(255,69,58,.25)}
.srs-btn.medium{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.25)}
.srs-btn.known{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.25)}
.progress-bar-bg{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.level-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid currentColor;opacity:.9}
.diff-dots{display:flex;gap:3px}
.diff-dot{width:6px;height:6px;border-radius:50%;background:var(--bg5)}
.diff-dot.filled{background:var(--accent)}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;font-size:14px;transition:all .2s;text-align:right;direction:rtl}
.quiz-option:active{transform:scale(.98)}
.quiz-option.correct{border-color:var(--green);background:rgba(48,209,88,.08);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(255,69,58,.08);color:var(--red)}
.stat-block{flex:1;background:var(--bg3);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px}
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);width:100%;outline:none}
.search-bar::placeholder{color:var(--text3)}
.immersion-word{background:rgba(94,92,230,.15);border-bottom:1.5px solid var(--accent);cursor:pointer;border-radius:2px}
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);white-space:nowrap}
.chip.active{border-color:var(--accent);background:rgba(94,92,230,.15);color:var(--text)}
.word-list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.word-list-item:active{background:var(--glass)}
.word-list-item:last-child{border-bottom:none}
.word-list-left{display:flex;align-items:center;gap:12px}
.word-arabic-sm{font-size:20px;font-weight:600;direction:rtl}
.word-translit-sm{font-size:12px;color:var(--text3);margin-top:1px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;color:var(--text)}
.word-detail-header{padding:20px 16px 0;display:flex;align-items:center;gap:12px}
.sep{height:1px;background:var(--border);margin:0 16px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
.fade-up{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;animation:fadeUp .3s ease;white-space:nowrap}
.install-tip{margin:12px 16px;background:rgba(94,92,230,.08);border:1px solid rgba(94,92,230,.2);border-radius:14px;padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.6}
.install-tip strong{color:var(--text2)}
</style>
</head>

<script>
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const VOCABULARY=[{id:1,arabic:"إحباط",transliteration:"i7bat",definition:"Frustration profonde ou découragement suite à un échec répété",nuance:"Plus fort que 'زعفان' — implique un état durable, pas juste un moment de colère. Souvent utilisé en introspection.",register:"Psychologie · Émotionnel",origin:"Fusha → Darija",frequency:"Très courant",difficulty:2,category:"psychologie",synonyms:["خيبة","يأس خفيف"],antonyms:["حماس","تحفيز"],examples:["حسيت بإحباط كبير ملي ما تحققش هاد الشي","الإحباط ما خلاهش يكمل فالمشروع","كيف كتتعامل مع الإحباط ملي الأمور ما تجيش كما بغيتي؟"],errors:"Ne pas confondre avec 'زعفان' (énervé momentanément) — إحباط est plus profond et durable.",level:"riche"},{id:2,arabic:"الوعي الذاتي",transliteration:"l-wa3y dh-dhati",definition:"Conscience de soi, capacité à s'observer et comprendre ses propres émotions",nuance:"Expression phare dans les cercles de développement personnel marocains, podcasts, interviews. Distingue une personne cultivée.",register:"Psychologie · Développement personnel",origin:"Fusha → Darija cultivée",frequency:"Courant dans médias",difficulty:3,category:"psychologie",synonyms:["معرفة الذات","التأمل الداخلي"],antonyms:["الغفلة","عدم الوعي"],examples:["الوعي الذاتي هو أول خطوة باش تتطور","ناس عندهم وعي ذاتي عالي كيعرفو واشبغاو من الحياة","بدونش الوعي الذاتي، كتكرر نفس الأخطاء"],errors:"Éviter de dire juste 'واعي بروحو' dans un contexte soutenu — utiliser l'expression complète.",level:"avancé"},{id:3,arabic:"الغموض",transliteration:"l-ghomud",definition:"L'ambiguïté, le flou, ce qui n'est pas clair ou défini",nuance:"Utilisé dans des contextes intellectuels (art, politique, relations). Plus noble que 'مش واضح'.",register:"Langage soutenu · Débat · Art",origin:"Fusha → Darija intellectuelle",frequency:"Courant chez intellectuels",difficulty:3,category:"pensée critique",synonyms:["اللاوضوح","التضبيب"],antonyms:["الوضوح","الشفافية"],examples:["غموض الرسالة خلى الناس يفسروها بطرق مختلفة","سياسة الغموض ما كتخدمش فالعلاقات","الفن كيشتغل على الغموض والتأويل"],errors:"Ne pas dire 'الغموضية' — la forme correcte est 'الغموض' seulement.",level:"avancé"},{id:4,arabic:"التناقض",transliteration:"t-tanaqud",definition:"La contradiction, deux réalités qui s'opposent dans une même situation ou personne",nuance:"Très utilisé dans les débats marocains et analyses sociales. Implique une tension intellectuelle.",register:"Débat · Philosophie · Société",origin:"Fusha → Darija de débat",frequency:"Fréquent",difficulty:3,category:"débat",synonyms:["التضارب","التعارض"],antonyms:["الانسجام","التوافق"],examples:["كاين تناقض واضح بين كلامو وأفعالو","المجتمع المغربي عيش فالتناقض بين التقليد والحداثة","هاد التناقض هو اللي كيخلق الصراع"],errors:"Ne pas confondre avec 'الاختلاف' (différence simple) — التناقض implique une opposition directe.",level:"riche"},{id:5,arabic:"الهشاشة العاطفية",transliteration:"l-hshasha l-3atifiya",definition:"La vulnérabilité émotionnelle, le fait d'être facilement blessé ou affecté",nuance:"Expression montée en popularité via podcasts psy marocains. Connotation neutre, introspective.",register:"Psychologie · Émotionnel · Intime",origin:"Calque de 'vulnérabilité' → Darija moderne",frequency:"Très courant aujourd'hui",difficulty:3,category:"émotions complexes",synonyms:["الضعف العاطفي","الحساسية الزايدة"],antonyms:["الصلابة العاطفية","الحصانة"],examples:["الهشاشة العاطفية مو عيب، هي علامة إنك إنسان","اعترافو بهشاشته العاطفية ساعدو يتعافى","ملي كتكون هشاش عاطفياً، الكلمات كتأثر فيك بزاف"],errors:"Ne pas traduire littéralement 'هش' comme fragile physiquement — ici le contexte est strictement émotionnel.",level:"avancé"},{id:6,arabic:"الاستحقاق",transliteration:"l-isti7qaq",definition:"Le mérite, le droit moral à quelque chose qu'on a gagné ou mérité",nuance:"Utilisé dans des débats sur la justice sociale, le travail, les droits. Différent de الحق (droit légal).",register:"Société · Justice · Débat",origin:"Fusha → Darija cultivée",frequency:"Courant",difficulty:3,category:"société",synonyms:["الجدارة","الكفاءة"],antonyms:["المحسوبية","الواسطة"],examples:["فلسفة الاستحقاق كتقول إن كل واحد يأخذ على حسب ما خدم","سؤال الاستحقاق مطروح بقوة فالنقاشات الاجتماعية","ما كانش الاستحقاق، كانت الواسطة والمحسوبية"],errors:"Différent de 'التكبر' (arrogance) — الاستحقاق est une revendication légitime.",level:"avancé"},{id:7,arabic:"التردد",transliteration:"t-taraddud",definition:"L'hésitation, l'incapacité à se décider entre deux options",nuance:"Implique un conflit intérieur profond. Utilisé dans des contextes psychologiques et personnels.",register:"Psychologie · Quotidien soutenu",origin:"Fusha → Darija",frequency:"Très fréquent",difficulty:1,category:"psychologie",synonyms:["الشك","عدم الحسم"],antonyms:["الحسم","العزيمة"],examples:["التردد ديالو خلاه يضيع الفرصة","كاين فرق بين التردد الصحي والتردد اللي كيشل","ملي كتكثر التفكير، كيزيد التردد"],errors:"Ne pas confondre avec 'الكسل' (paresse) — التردد est cognitif, pas comportemental.",level:"courant"},{id:8,arabic:"الانتماء",transliteration:"l-intimaa",definition:"Le sentiment d'appartenance à un groupe, une culture, un lieu",nuance:"Mot clé dans les débats identitaires marocains. Très chargé émotionnellement et socialement.",register:"Société · Identité · Émotionnel",origin:"Fusha → Darija cultivée",frequency:"Fréquent",difficulty:2,category:"société",synonyms:["الهوية","الانتساب"],antonyms:["الاغتراب","الانفصال"],examples:["إحساس الانتماء ضروري للصحة النفسية","المغاربة فالخارج كيعيشو أزمة الانتماء","انتماؤه لهاد المدينة كيبان من طريقة حديثو"],errors:"Différent de 'الهوية' (identité) — الانتماء est le sentiment affectif d'appartenance.",level:"riche"},{id:9,arabic:"النخبوية",transliteration:"n-nakhbawiya",definition:"L'élitisme, la mentalité ou comportement d'une élite qui se distingue du commun",nuance:"Souvent péjoratif dans le discours populaire marocain. Employé dans les critiques sociales et politiques.",register:"Critique sociale · Politique · Débat",origin:"Fusha → Darija de presse",frequency:"Courant dans médias",difficulty:4,category:"politique",synonyms:["الاستعلاء","التفوقية الاجتماعية"],antonyms:["الشعبية","التواضع الاجتماعي"],examples:["النخبوية ديالهم ظاهرة في طريقة كلامهم","النقاش الأكاديمي كيطيح فالنخبوية","النخبوية حاجز بين المثقف والمواطن العادي"],errors:"Ne pas confondre avec 'التكبر' (arrogance personnelle) — النخبوية est un phénomène social structurel.",level:"élite"},{id:10,arabic:"الإسقاط النفسي",transliteration:"l-isqat n-nafsi",definition:"La projection psychologique — attribuer à l'autre ses propres sentiments ou défauts",nuance:"Expression technique de psychologie devenue populaire dans les discussions marocaines modernes.",register:"Psychologie · Relations humaines",origin:"Terme technique → Darija éduquée",frequency:"Montant",difficulty:4,category:"psychologie",synonyms:["تحميل الآخر","نسب الصفات للغير"],antonyms:["التأمل الذاتي","المساءلة الذاتية"],examples:["ملي كتنتقد الناس على أشياء فيك، هذا هو الإسقاط النفسي","الإسقاط النفسي آلية دفاع لاوعية","كيف تعرف واش راك كتعمل إسقاطاً نفسياً؟"],errors:"Ne pas utiliser pour décrire une simple accusation — الإسقاط النفسي est inconscient et mécanisme de défense.",level:"élite"},{id:11,arabic:"الطموح المفرط",transliteration:"t-tumu7 l-mufrit",definition:"L'ambition excessive qui dépasse les capacités ou dérègle la vie",nuance:"Expression nuancée — le طموح seul est positif, mais مفرط le transforme en défaut.",register:"Développement personnel · Psychologie",origin:"Darija cultivée",frequency:"Courant",difficulty:2,category:"personnalité",synonyms:["الجشع المهني","التطلع الزائد"],antonyms:["القناعة","التوازن"],examples:["الطموح المفرط كيخلي الواحد ما يستمتعش بما حقق","الفرق بين الطموح والطموح المفرط هو الوعي","طموحه المفرط دمر علاقاته الشخصية"],errors:"Toujours utiliser مفرط pour nuancer — sans lui, طموح seul est positif.",level:"riche"},{id:12,arabic:"التبرير",transliteration:"t-tabreer",definition:"La rationalisation — trouver des justifications à ses comportements pour éviter la culpabilité",nuance:"En psychologie, le تبرير est un mécanisme de défense. En darija courante, aussi utilisé péjorativement.",register:"Psychologie · Quotidien",origin:"Fusha → Darija",frequency:"Très fréquent",difficulty:1,category:"psychologie",synonyms:["التعلل","الحجج الواهية"],antonyms:["المسؤولية","الاعتراف"],examples:["مكيبقاش كيعتذر، دايما كيبرر","التبرير مو حل، هو هروب من المسؤولية","كلنا كنبررو في مرحلة من المراحل"],errors:"Différent de 'الشرح' (explication légitime) — التبرير sert à éviter la responsabilité.",level:"courant"},{id:13,arabic:"الحدود الشخصية",transliteration:"l-7dud sh-shakhsiya",definition:"Les limites personnelles — ce qu'on accepte ou refuse dans ses relations",nuance:"Concept central du développement personnel marocain moderne. Souvent dit 'les limites' en code-switching.",register:"Relations humaines · Psychologie",origin:"Calque de 'personal boundaries' → Darija moderne",frequency:"Très courant aujourd'hui",difficulty:2,category:"relations humaines",synonyms:["الخطوط الحمراء","حدود المقبول"],antonyms:["الانفتاح الكلي","التساهل المفرط"],examples:["وضع الحدود الشخصية مو أنانية، هو احترام الذات","ما عندوش حدود شخصية فعلاقاته","كيف كتحدد حدودك الشخصية مع الناس القريبين؟"],errors:"Ne pas confondre avec 'الخصوصية' (vie privée) — الحدود الشخصية concerne les comportements acceptables.",level:"riche"},{id:14,arabic:"الخطاب",transliteration:"l-khitab",definition:"Le discours — ensemble cohérent d'idées, de langage et de positions sur un sujet",nuance:"Terme d'analyse critique et médiatique. Utilisé dans les cercles intellectuels marocains.",register:"Politique · Intellectuel · Médias",origin:"Fusha → Darija intellectuelle",frequency:"Fréquent dans médias",difficulty:4,category:"politique",synonyms:["الرواية","الموقف الإيديولوجي"],antonyms:[],examples:["الخطاب الرسمي مختلف على الواقع المعاش","تحليل الخطاب السياسي يكشف الكثير","كاين خطاب متحكم فيه فوراء هاد الرسالة"],errors:"Différent de 'الكلام' (parole ordinaire) — الخطاب implique une structure idéologique.",level:"élite" function getParcoursWords(p){return VOCABULARY.filter(w=>p.categories.includes(w.category))}
function getParcoursMastery(p,srsData){
const words=getParcoursWords(p);
if(!words.length)return 0;
const known=words.filter(w=>srsData[w.id]&&srsData[w.id].status==='known').length;
return Math.round((known/words.length)*100);
}
function findParcoursForWord(wordId){
const w=VOCABULARY.find(v=>v.id===wordId);
if(!w)return null;
return PARCOURS.find(p=>p.categories.includes(w.category))||null;
}

// ── SRS ENGINE (SM-2 simplifié) ──
// quality: 0 = inconnu, 1 = moyen, 2 = je connais
function reviewCard(srsData,id,quality){
const prev=srsData[id]||{ease:2.5,interval:0,reps:0,due:new Date().toISOString()};
let{ease,interval,reps}=prev;
if(quality===0){reps=0;interval=1;ease=Math.max(1.3,ease-0.25)}
else if(quality===1){reps=reps+1;interval=reps<=1?1:Math.max(1,Math.round(interval*1.2));ease=Math.max(1.3,ease-0.05)}
else{reps=reps+1;interval=reps<=1?3:Math.round(interval*ease);ease=Math.min(2.8,ease+0.1)}
const due=new Date(Date.now()+interval*86400000).toISOString();
const status=quality===0?'unknown':quality===1?'medium':'known';
const card={ease,interval,reps,due,status,lastReview:new Date().toISOString()};
return{...srsData,[id]:card};
}
function isDue(card){if(!card)return true;return new Date(card.due)<=new Date()}
function dayOfYear(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000)}

// ── AUDIO ──
let _voicesCache=[];
function warmUpVoices(){
try{
if(!('speechSynthesis' in window))return;
const synth=window.speechSynthesis;
const grab=()=>{const v=synth.getVoices();if(v&&v.length)_voicesCache=v};
grab();
synth.addEventListener('voiceschanged',grab);
}catch(e){}
}
function speakArabic(text){
try{
if(!('speechSynthesis' in window))return;
const synth=window.speechSynthesis;
synth.cancel();
const voices=(_voicesCache&&_voicesCache.length)?_voicesCache:synth.getVoices();
const u=new SpeechSynthesisUtterance(text);
const arVoice=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('ar'));
if(arVoice)u.voice=arVoice;
u.lang=arVoice?arVoice.lang:'ar-SA';
u.rate=0.8;
u.pitch=1;
synth.speak(u);
}catch(e){}
}

// ── IMMERSION ──
function ImmersionTab({onOpen,activeId,onSetActiveId,onRead}){
  const active=IMMERSION_TEXTS.find(t=>t.id===activeId)||IMMERSION_TEXTS[0];
  const[toast,setToast]=useState(null);
  useEffect(()=>{onRead(active.id)},[active.id]);
  const renderText=(text,kws)=>{
    let parts=[{text,isWord:false}];
    kws.forEach(kw=>{
      const np=[];
      parts.forEach(p=>{
        if(p.isWord||!p.text.includes(kw)){np.push(p);return;}
        const idx=p.text.indexOf(kw);
        if(idx>0)np.push({text:p.text.slice(0,idx),isWord:false});
        np.push({text:kw,isWord:true});
        if(idx+kw.length<p.text.length)np.push({text:p.text.slice(idx+kw.length),isWord:false});
      });
      parts=np;
    });
    return parts;
  };
  const tap=word=>{
    const f=VOCABULARY.find(v=>word.includes(v.arabic)||v.arabic.includes(word));

        keyWords.map(w=>React.createElement('div',{key:w.id,onClick:()=>onOpen(w),style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 4px',cursor:'pointer',borderBottom:'1px solid var(--border)'}},

// ── QUIZ ──
// ── QUIZ (version corrigée) ──
function QuizTab({srsData,onSRS,initialMode,initialTextId,initialParcoursId,initialUnitId,onModeConsumed,onUnitComplete,onExitToLibrary}){

// Résout, une seule fois à l'ouverture de l'onglet, quelle sélection de mots utiliser
// selon la provenance (parcours pédagogique, unité, révision du jour, ou tous les mots)
const resolve=()=>{
if(initialMode==='due'){
const words=VOCABULARY.filter(w=>isDue(srsData[w.id]));
return{mode:'due',rawPool:words,label:'Révision du jour',unit:null};
}
if(initialMode==='parcours'){
const p=PARCOURS.find(x=>x.id===initialParcoursId);
return{mode:'parcours',rawPool:p?getParcoursWords(p):[],label:p?p.title:'Parcours',unit:null};
}
if(initialMode==='unit'){
const u=UNITS.find(x=>x.id===initialUnitId);
return{mode:'unit',rawPool:u?getUnitWords(u):[],label:u?u.title:'Unité',unit:u||null};
}
if(initialMode==='text'&&initialTextId){
const t=IMMERSION_TEXTS.find(x=>x.id===initialTextId);
return{mode:'text',rawPool:t?getTextVocab(t):[],label:t?t.title:'Quiz',unit:null};
}
return{mode:'all',rawPool:VOCABULARY,label:'Tous les mots',unit:null};
};

const[ctx]=useState(resolve); // figé une seule fois à l'entrée dans l'onglet
const isEmpty=ctx.rawPool.length===0;
const pool=isEmpty?VOCABULARY:ctx.rawPool; // filet de sécurité interne pour ne jamais casser les hooks
const total=pool.length;

useEffect(()=>{if(onModeConsumed)onModeConsumed()},[]); // consomme l'intention de navigation une seule fois

// makeQ construit la question ET fige les options (avec un id stable) une seule fois
const makeQ=i=>{
const word=pool[i%pool.length];
const wrong=VOCABULARY.filter(w=>w.id!==word.id).sort(()=>Math.random()-.5).slice(0,3);
const opts=[word,...wrong]
.sort(()=>Math.random()-.5)
.map(w=>({id:w.id,text:w.definition,isCorrect:w.id===word.id}));
return{word,options:opts};
};

const[idx,setIdx]=useState(0);
const[q,setQ]=useState(()=>makeQ(0));
const[selectedId,setSelectedId]=useState(null);
const[finished,setFinished]=useState(false);
const correctRef=useRef(0);

const restart=()=>{
correctRef.current=0;
setIdx(0);
setQ(makeQ(0));
setSelectedId(null);
setFinished(false);
};

const handle=opt=>{
if(selectedId!==null||finished)return; // empêche tout second clic pendant l'affichage du résultat
setSelectedId(opt.id);
if(opt.isCorrect)correctRef.current+=1;
const quality=opt.isCorrect?2:0; // 2 = je connais, 0 = inconnu (moteur SRS SM-2 simplifié)
const n=reviewCard(srsData,q.word.id,quality);
saveSRS(n);
onSRS(n);

setTimeout(()=>{
const nextIdx=idx+1;
if(nextIdx>=total){
setFinished(true);
setSelectedId(null);
if(ctx.mode==='unit'&&ctx.unit&&onUnitComplete){
const score=Math.round((correctRef.current/total)*100);
onUnitComplete(ctx.unit.id,score>=80,score);
}
}else{
setIdx(nextIdx);
setQ(makeQ(nextIdx)); // toujours dérivé du même idx que celui qu'on vient de committer
setSelectedId(null);
}
},1200);
};

if(isEmpty){
return React.createElement('div',null,
React.createElement('div',{style:{padding:'20px 16px 8px'}},
React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},'Quiz')
),
React.createElement('div',{className:'section'},
React.createElement('div',{className:'card',style:{padding:28,textAlign:'center'}},
React.createElement('div',{style:{fontSize:40,marginBottom:10}},'🎉'),
React.createElement('div',{style:{fontSize:15,fontWeight:600,marginBottom:6}},'Rien à réviser pour le moment'),
React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:18}},'Tous les mots de cette sélection sont déjà à jour.'),
onExitToLibrary&&React.createElement('button',{onClick:onExitToLibrary,style:{background:'var(--accent)',border:'none',borderRadius:12,padding:'12px 20px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'Retour')
)
)
);
}

if(finished){
const score=Math.round((correctRef.current/total)*100);
const passed=score>=80;
return React.createElement('div',null,
React.createElement('div',{style:{padding:'20px 16px 8px'}},
React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},ctx.label)
),
React.createElement('div',{className:'section'},
React.createElement('div',{className:'card',style:{padding:28,textAlign:'center'}},
React.createElement('div',{style:{fontSize:40,marginBottom:10}},passed?'🏆':'💪'),
React.createElement('div',{style:{fontSize:22,fontWeight:700,marginBottom:4}},score+'%'),
React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginBottom:4}},correctRef.current+' / '+total+' bonnes réponses'),
ctx.mode==='unit'&&React.createElement('div',{style:{fontSize:13,color:passed?'var(--green)':'var(--red)',marginTop:8,marginBottom:10,fontWeight:600}},passed?'Palier validé ✓ (80% requis)':'Palier non validé — 80% requis'),
React.createElement('div',{style:{display:'flex',gap:10,justifyContent:'center',marginTop:18}},
React.createElement('button',{onClick:restart,style:{background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 18px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'🔁 Recommencer'),
onExitToLibrary&&React.createElement('button',{onClick:onExitToLibrary,style:{background:'var(--accent)',border:'none',borderRadius:12,padding:'12px 18px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'Retour')
)
)
)
);
}

return React.createElement('div',null,
React.createElement('div',{style:{padding:'20px 16px 8px'}},
React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5}},ctx.label),
React.createElement('div',{style:{fontSize:13,color:'var(--text3)',marginTop:4}},'Question '+(idx+1)+' · '+total+' mot'+(total>1?'s':''))
),
React.createElement('div',{className:'section',style:{marginTop:8}},
React.createElement('div',{className:'word-hero',style:{cursor:'default',marginBottom:20}},
React.createElement('div',{className:'word-hero-content'},
React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}},'QUEL EST LE SENS ?'),
React.createElement('div',{className:'arabic-text'},q.word.arabic),
React.createElement('div',{className:'transliteration'},q.word.transliteration),
React.createElement('div',{style:{marginTop:10}},React.createElement(LevelBadge,{level:q.word.level}))
)
),
// clé stable = id du mot dont provient la définition -> ne bouge jamais tant que q ne change pas
...q.options.map(opt=>{
let cls='quiz-option';
if(selectedId!==null){
if(opt.isCorrect)cls+=' correct'; // révèle toujours la bonne réponse en vert
else if(opt.id===selectedId)cls+=' wrong'; // seule celle cliquée (si fausse) passe en rouge
}
return React.createElement('div',{
key:opt.id,
className:cls,
style:{pointerEvents:selectedId!==null?'none':'auto'},
onClick:()=>handle(opt)
},opt.text);
})
)
);
}
// ── PROGRESS ──
function ProgressTab({srsData,stats,onImport,readTexts}){
  const known=Object.values(srsData).filter(v=>v.status==='known').length;
  const medium=Object.values(srsData).filter(v=>v.status==='medium').length;
  const unknown=Object.values(srsData).filter(v=>v.status==='unknown').length;
  const pctKnown=Math.round((known/VOCABULARY.length)*100);
  const hasReadImmersion=(readTexts||[]).length>0;
  const badge=pctKnown>70&&hasReadImmersion?{ar:'المفكر',fr:'Penseur',color:'#BF5AF2',icon:'🧠'}
    :pctKnown>=30?{ar:'المشارك',fr:'Participant au débat',color:'#0A84FF',icon:'💬'}
    :{ar:'الملاحظ',fr:'Observateur',color:'#8E8E93',icon:'👁️'};
  const fileRef=useRef(null);
  const handleExport=()=>{
    try{
      const data=JSON.stringify({srs:srsData,stats,exportedAt:new Date().toISOString()},null,2);
      const blob=new Blob([data],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='darija-elevate-backup.json';a.click();
      URL.revokeObjectURL(url);
    }catch(e){}
  };
  const handleImportFile=e=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(parsed&&parsed.srs)onImport(parsed.srs,parsed.stats||{});
      }catch(err){}
    };
    reader.readAsText(file);
    e.target.value='';
  };
  return React.createElement('div',null,
    React.createElement('div',{style:{padding:'20px 16px 8px'}},
      React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:-.5,marginBottom:4}},'Progression'),
      React.createElement('div',{style:{fontSize:13,color:'var(--text3)'}},'Votre parcours vers l\'élite')
    ),
    React.createElement('div',{style:{padding:'0 16px 16px'}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12,background:badge.color+'22',border:'1px solid '+badge.color+'55',borderRadius:16,padding:'14px 18px'}},
        React.createElement('div',{style:{fontSize:28}},badge.icon),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:16,fontWeight:700,color:'#fff'}},badge.ar+' · '+badge.fr),
          React.createElement('div',{style:{fontSize:12,color:'var(--text3)',marginTop:2}},pctKnown+'% du dictionnaire maîtrisé'+(hasReadImmersion?' · immersion active':''))
        )
      )
    ),
    React.createElement('div',{style:{padding:'0 16px 16px'}},
      React.createElement('div',{style:{background:'linear-gradient(135deg,#1a1a2e,#16213e)',border:'1px solid rgba(94,92,230,.3)',borderRadius:24,padding:28,textAlign:'center',position:'relative',overflow:'hidden'}},
        React.createElement('div',{style:{position:'absolute',top:-40,right:-40,width:160,height:160,background:'radial-gradient(circle,rgba(94,92,230,.2),transparent 70%)',borderRadius:'50%'}}),
        React.createElement('div',{style:{fontSize:72,fontWeight:800,color:'white',letterSpacing:-2}},known),
        React.createElement('div',{style:{fontSize:16,color:'rgba(255,255,255,.5)'}},'mots maîtrisés'),
        React.createElement('div',{style:{marginTop:16,display:'flex',justifyContent:'center',gap:24}},
          React.createElement('div',{style:{textAlign:'center'}},React.createElement('div',{style:{fontSize:20,fontWeight:700,color:'#FF9F0A'}},medium),React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)'}},'en révision')),
          React.createElement('div',{style:{width:1,background:'rgba(255,255,255,.1)'}}),
          React.createElement('div',{style:{textAlign:'center'}},React.createElement('div',{style:{fontSize:20,fontWeight:700,color:'#FF453A'}},unknown),React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,.4)'}},'inconnus'))
        )
      )
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'Par niveau'),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        LEVELS.map(lv=>{
          const lvWords=VOCABULARY.filter(w=>w.level===lv.id);
          const lvKnown=lvWords.filter(w=>srsData[w.id]&&srsData[w.id].status==='known').length;
          const pct=lvWords.length?Math.round(lvKnown/lvWords.length*100):0;
          return React.createElement('div',{key:lv.id,className:'card'},
            React.createElement('div',{style:{padding:16}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:10}},
                React.createElement('span',{className:'level-badge',style:{color:lv.color,borderColor:lv.color+'44'}},lv.label),
                React.createElement('span',{style:{fontSize:13,color:'var(--text3)'}},lvKnown+'/'+lvWords.length)
              ),
              React.createElement('div',{className:'progress-bar-bg'},
                React.createElement('div',{className:'progress-bar-fill',style:{width:pct+'%',background:lv.color}})
              )
            )
          );
        })
      )
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'Par parcours'),
      React.createElement('div',{className:'card'},
        PARCOURS.map(p=>{
          const pw=getParcoursWords(p);
          const pk=pw.filter(w=>srsData[w.id]&&srsData[w.id].status==='known').length;
          const pct=getParcoursMastery(p,srsData);
          return React.createElement('div',{key:p.id,className:'detail-row'},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
              React.createElement('span',{style:{fontSize:18}},p.icon),
              React.createElement('span',{className:'detail-label'},p.title)
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{style:{fontSize:14,fontWeight:600,color:p.color}},pk+'/'+pw.length+' ('+pct+'%)'),
              React.createElement('div',{style:{fontSize:11,color:'var(--text3)'}},'maîtrisés')
            )
          );
        })
      )
    ),
    React.createElement('div',{className:'section'},
      React.createElement('div',{className:'section-title'},'Sauvegarde'),
      React.createElement('div',{className:'card',style:{padding:16,display:'flex',flexDirection:'column',gap:10}},
        React.createElement('div',{style:{fontSize:12,color:'var(--text3)',lineHeight:1.5}},'Tes données sont stockées uniquement sur cet appareil. Exporte-les pour les garder en sécurité ou les transférer.'),
        React.createElement('button',{onClick:handleExport,style:{background:'var(--accent)',border:'none',borderRadius:12,padding:'12px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'⬇ Exporter mes données'),
        React.createElement('button',{onClick:()=>fileRef.current&&fileRef.current.click(),style:{background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:12,padding:'12px',color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}},'⬆ Importer une sauvegarde'),
        React.createElement('input',{ref:fileRef,type:'file',accept:'application/json',style:{display:'none'},onChange:handleImportFile})
      )
    ),
    React.createElement('div',{style:{height:20}})
  );
}

// ── APP ──
const TABS=[{id:'home',icon:'⌂',label:'Accueil'},{id:'library',icon:'◫',label:'Mots'},{id:'immersion',icon:'◉',label:'Immersion'},{id:'quiz',icon:'◈',label:'Quiz'},{id:'progress',icon:'▣',label:'Progrès'}];

function App(){
  const[tab,setTab]=useState('home');
  const[word,setWord]=useState(null);
  const[srsData,setSrsData]=useState(loadSRS);
  const[stats,setStats]=useState(()=>{
    const s=loadStats();
    const today=new Date().toDateString();
    if(s.lastDay!==today){
      const y=new Date(Date.now()-86400000).toDateString();
      const streak=s.lastDay===y?(s.streak||0)+1:1;
      const ns={...s,streak,lastDay:today};
      saveStats(ns);return ns;
    }
    return s;
  });
  const[immersionId,setImmersionIdState]=useState(()=>{try{return JSON.parse(localStorage.getItem('darija_last_immersion'))||IMMERSION_TEXTS[0].id}catch(e){return IMMERSION_TEXTS[0].id}});
  const[readTexts,setReadTexts]=useState(()=>{try{return JSON.parse(localStorage.getItem('darija_read_texts'))||[]}catch(e){return[]}});
  const[unitProgress,setUnitProgress]=useState(loadUnitProgress);
  const[quizInit,setQuizInit]=useState(null);

  const scrollRef=useRef(null);
  const go=t=>{setTab(t);setWord(null);scrollRef.current?.scrollTo(0,0)};
  const open=w=>{setWord(w);scrollRef.current?.scrollTo(0,0)};
  const back=()=>{setWord(null);scrollRef.current?.scrollTo(0,0)};
  const updateSRS=n=>{setSrsData(n)};
  const onImport=(srs,st)=>{
    setSrsData(srs);saveSRS(srs);
    setStats(st);saveStats(st);
  };

  const setImmersionId=id=>{setImmersionIdState(id);try{localStorage.setItem('darija_last_immersion',JSON.stringify(id))}catch(e){}};
  const markTextRead=id=>{setReadTexts(prev=>{if(prev.includes(id))return prev;const n=[...prev,id];try{localStorage.setItem('darija_read_texts',JSON.stringify(n))}catch(e){}return n})};
  const goToImmersion=id=>{setImmersionId(id);setWord(null);setTab('immersion');scrollRef.current?.scrollTo(0,0)};
  const goToQuizDue=()=>{setQuizInit({mode:'due'});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToQuizParcours=pid=>{setQuizInit({mode:'parcours',parcoursId:pid});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToQuizUnit=uid=>{setQuizInit({mode:'unit',unitId:uid});setWord(null);setTab('quiz');scrollRef.current?.scrollTo(0,0)};
  const goToProgress=()=>go('progress');
  const consumeQuizInit=()=>setQuizInit(null);
  const onUnitComplete=(unitId,passed,score)=>{
    setUnitProgress(prev=>{
      const prevBest=(prev[unitId]&&prev[unitId].bestScore)||0;
      const n={...prev,[unitId]:{completed:passed||(prev[unitId]&&prev[unitId].completed)||false,bestScore:Math.max(score,prevBest)}};
      saveUnitProgress(n);
      return n;
    });
  };

  let content;
  if(word)content=React.createElement(WordDetail,{word,onBack:back,onSRS:updateSRS,srsData,onGoToImmersion:goToImmersion});
  else if(tab==='home')content=React.createElement(HomeTab,{onOpen:open,srsData,stats,lastImmersionId:immersionId,onGoToImmersion:goToImmersion,onGoToQuizDue:goToQuizDue,onGoToProgress:goToProgress});
  else if(tab==='library')content=React.createElement(LibraryTab,{onOpen:open,srsData,onGoToImmersion:goToImmersion,onGoToQuizUnit:goToQuizUnit,unitProgress});
  else if(tab==='immersion')content=React.createElement(ImmersionTab,{onOpen:open,activeId:immersionId,onSetActiveId:setImmersionId,onRead:markTextRead});
  else if(tab==='quiz')content=React.createElement(QuizTab,{srsData,onSRS:updateSRS,initialMode:quizInit&&quizInit.mode,initialTextId:quizInit&&quizInit.textId,initialParcoursId:quizInit&&quizInit.parcoursId,initialUnitId:quizInit&&quizInit.unitId,onModeConsumed:consumeQuizInit,onUnitComplete,onExitToLibrary:()=>go('library')});
  else content=React.createElement(ProgressTab,{srsData,stats,onImport,readTexts});

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'scroll-area',ref:scrollRef},content),
    React.createElement('nav',{className:'nav-bar'},
      TABS.map(t=>React.createElement('button',{key:t.id,className:'nav-item'+(tab===t.id&&!word?' active':''),onClick:()=>go(t.id)},
        React.createElement('span',{className:'nav-icon'},t.icon),
        React.createElement('span',{className:'nav-label'},t.label)
      ))
    )
  );
}

warmUpVoices();
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
